name: Monad Vibe Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Dockerfile.vibe
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.vibe
          target: build
          tags: |
            vibe-room-monad:build
            ghcr.io/${{ github.repository_owner }}/monad:build-${{ github.sha }}
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify binary exists
        run: |
          docker run --rm vibe-room-monad:build test -f /src/build/cmd/monad && echo "✅ monad binary exists"
          docker run --rm vibe-room-monad:build test -f /src/build/cmd/monad-cli && echo "✅ monad-cli binary exists"

      - name: Extract ctest results
        run: |
          docker run --rm vibe-room-monad:build cat /src/build/ctest-results.log || echo "⚠️ No ctest log found"

      - name: Push to GHCR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.vibe
          target: runner
          tags: |
            ghcr.io/${{ github.repository_owner }}/monad:latest
            ghcr.io/${{ github.repository_owner }}/monad:${{ github.sha }}
          push: true
          cache-from: type=gha
